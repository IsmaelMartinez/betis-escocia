name: Refresh Standings

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-standings:
    name: Refresh La Liga Standings
    runs-on: ubuntu-latest
    steps:
      - name: Refresh standings cache
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" https://betis-escocia.vercel.app/api/standings)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          SOURCE=$(echo "$BODY" | jq -r '.source // "unknown"')
          echo "HTTP status: $HTTP_CODE"
          echo "Data source: $SOURCE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Standings refresh failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Standings refreshed successfully (source: $SOURCE)"
