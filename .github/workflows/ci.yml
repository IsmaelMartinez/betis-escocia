name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # Required checks that block PR merge
  test:
    name: Tests (Required)
    runs-on: ubuntu-latest
    permissions:
      contents: read        # Read repository contents
      checks: write         # Write check results
    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run linting
        run: npm run lint
      - name: Run type checking
        run: npm run type-check
      - name: Run unit and integration tests
        run: npm test
      - name: Build project
        run: npm run build

  # Non-blocking checks that provide feedback but don't block merge
  quality:
    name: Quality Checks (Non-blocking)
    runs-on: ubuntu-latest
    permissions:
      contents: read        # Read repository contents
    continue-on-error: true
    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate test coverage
        run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # NOTE: Production deployment is handled by Vercel's automatic GitHub
  # integration. The CI pipeline runs tests and quality checks; deploys
  # happen via Vercel directly on merge to main.